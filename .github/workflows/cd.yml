name: CD Pipeline

on:
  push:
    branches:
      - main
      - deploy

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}
          logout: true
      - run: docker info
      - run: docker system info
      - run: echo $GHCR_USERNAME
      - name: Build & push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile-frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-frontend:latest
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile-backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:latest
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd /home/snap/viktoria/viktoria && \
            sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} && \
            export FRONTEND_IMAGE=ghcr.io/${{ github.repository }}-frontend:${{ github.sha }} && \
            export BACKEND_IMAGE=ghcr.io/${{ github.repository }}-backend:${{ github.sha }} && \
            sudo docker-compose -f docker-compose.prod.yml pull && \
            sudo docker-compose -f docker-compose.prod.yml down && \
            sudo docker-compose -f docker-compose.prod.yml up -d && \
            sudo docker-compose -f docker-compose.prod.yml ps"