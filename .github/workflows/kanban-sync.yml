name: Sync KANBAN

on:
  issues:
    types: [closed, reopened, assigned, unassigned]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync KANBAN.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync-kanban.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet project/KANBAN.md; then
            echo "Нет изменений в KANBAN.md"
            exit 0
          fi
          git config user.name "kanban-bot"
          git config user.email "kanban-bot@users.noreply.github.com"
          git add project/KANBAN.md
          git commit -m "kanban: sync from issue #${{ github.event.issue.number || 'manual' }}"
          git push
